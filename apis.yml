aid: opterrix
name: Opterrix
description: >-
  Opterrix delivers real-time and historical weather and natural hazard
  intelligence to inform and automate key decision-making throughout the
  insurance value chain. Their high-performance APIs provide property-level
  data on perils such as wind, hail, precipitation, wildfire, and convective
  storms, supporting underwriting, claims, portfolio risk management, and
  moratorium verification workflows.
