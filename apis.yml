apis:
  - aid: opterrix:data-api
    name: Opterrix Data API
    description: >-
      The Opterrix Data API provides real-time and historical weather and
      hazard data through high-performance endpoints designed for the
      insurance industry. It supports storm event history with
      location-based assessments, accumulation and capacity analysis for
      portfolio risk aggregation, real-time moratorium verification for
      wildfire, flood, earthquake, and hurricane exclusion zones, and
      property-level risk scoring for underwriting decisions.
